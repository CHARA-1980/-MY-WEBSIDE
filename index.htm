<!-- 轮播JS逻辑 -->
<script>
window.addEventListener('load', function () {
    const picList = document.querySelectorAll('.bg-item');
    const prevBtn = document.querySelector('.prev');
    const nextBtn = document.querySelector('.next');
    const bgBox = document.querySelector('.bg-box');
    let index = 0;
    let timer;
    const total = picList.length;

    function changeSlide() {
        picList.forEach(item => item.classList.remove('active'));
        picList[index].classList.add('active');
    }
    function nextSlide() {
        index = (index + 1) % total;
        changeSlide();
    }
    function prevSlide() {
        index = (index - 1 + total) % total;
        changeSlide();
    }
    timer = setInterval(nextSlide, 5000);
    bgBox.addEventListener('mouseover', () => clearInterval(timer));
    bgBox.addEventListener('mouseout', () => timer = setInterval(nextSlide, 5000));
    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);
})
</script>
